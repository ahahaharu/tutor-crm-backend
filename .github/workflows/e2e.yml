name: E2E Tests CI

on:
  push:
    branches: ['main', 'master']
  pull_request:
    branches: ['main', 'master']

jobs:
  test:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Create .env.test
        run: |
          echo "DB_HOST=127.0.0.1" >> .env.test
          echo "DB_PORT=5433" >> .env.test
          echo "DB_USER=postgres" >> .env.test
          echo "DB_PASSWORD=postgres" >> .env.test
          echo "DB_NAME=tutor_db_test" >> .env.test
          echo "JWT_SECRET=super-secret-test-key-for-ci" >> .env.test

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Docker version
        run: docker compose version

      - name: Run E2E tests
        run: pnpm run test:e2e
